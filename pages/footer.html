<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tov Ot Footer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Core Footer Styles */
    .site-footer {
      background-color: #3b82f6; /* Matching the vibrant blue color */
      color: #ffffff;
      padding: 60px 20px 20px 20px;
      width: 100%;
    }

    /* Main Content Layout (Grid) */
    .footer-container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr; /* Custom column balance */
      gap: 40px;
      padding-bottom: 40px;
    }

    /* Logo Section */
    .footer-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .footer-logo {
      height: 36px;
      width: auto;
      /* Optional: Filters to make placeholder black graphics look clean white */
      filter: brightness(0) invert(1); 
    }

    .brand-name {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    /* Column Group Styles */
    .footer-column {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .column-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    /* Interactive Links & Lists */
    .footer-links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .footer-links a {
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      font-size: 15px;
      transition: color 0.2s ease, transform 0.2s ease;
      display: inline-block;
    }

    .footer-links a:hover {
      color: #ffffff;
      transform: translateX(4px); /* Subtle slide-right on hover */
    }

    /* Contact Details Layout */
    .contact-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 15px;
    }

    .contact-item i {
      font-size: 16px;
      width: 20px; /* Fixed width prevents alignment issues */
      text-align: center;
    }

    .contact-item a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .contact-item a:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    /* Horizontal Divider Line */
    .footer-divider {
      border: 0;
      height: 1px;
      background-color: rgba(255, 255, 255, 0.2);
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Copyright & Bottom Bar */
    .footer-bottom {
      max-width: 1200px;
      margin: 0 auto;
      padding-top: 20px;
      text-align: center;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.8;
    }

    /* --- Responsive Styling (Tablets & Mobile) --- */
    @media (max-width: 768px) {
      .footer-container {
        grid-template-columns: 1fr; /* Switch to 1 column vertical stack */
        gap: 35px;
        text-align: center;
      }

      .footer-brand {
        justify-content: center;
      }

      .footer-links a:hover {
        transform: none; /* Disable shift on mobile */
      }

      .contact-item {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <footer class="site-footer">
    
    <div class="footer-container">
      
      <div class="footer-brand">
        <img src="logo.png" alt="Tov Ot Logo" class="footer-logo" onerror="this.style.display='none'">
        <span class="brand-name">Tov Ot</span>
      </div>

      <div class="footer-column">
        <h4 class="column-title">Quick Links</h4>
        <ul class="footer-links">
          <li><a href="#home">Home</a></li>
          <li><a href="#discover">Discover</a></li>
          <li><a href="#plan-trip">Plan Trip</a></li>
          <li><a href="#review">Review</a></li>
          <li><a href="#about">About Us</a></li>
        </ul>
      </div>

      <div class="footer-column">
        <h4 class="column-title">Contact Us</h4>
        <ul class="contact-list">
          <li class="contact-item">
            <i class="fa-solid fa-phone"></i>
            <a href="tel:+85512345678">+855 12 345 678</a>
          </li>
          <li class="contact-item">
            <i class="fa-solid fa-envelope"></i>
            <a href="mailto:info@tovot.com">info@tovot.com</a>
          </li>
          <li class="contact-item">
            <i class="fa-solid fa-location-dot"></i>
            <span>Koh Kong, Cambodia</span>
          </li>
        </ul>
      </div>

    </div>

    <hr class="footer-divider">

    <div class="footer-bottom">
      <p>&copy; <span id="current-year">2026</span> TOV OT | All Rights Reserved</p>
      <p>Designed & Developed by TOV OT Team</p>
    </div>

  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Set year automatically based on user's current device calendar
      const yearSpan = document.getElementById("current-year");
      if (yearSpan) {
        yearSpan.textContent = new Date().getFullYear();
      }
    });
  </script>

</body>
</html>
