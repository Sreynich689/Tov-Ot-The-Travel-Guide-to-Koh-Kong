<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body class="auth-bg-alt">

  <div class="min-vh-100 d-flex align-items-center justify-content-center px-3">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5">
      <div class="card p-4 p-md-5">

        <h1 class="heading text-center mb-3">Enter 4-Digits Code</h1>

        <p class="subtext text-center mb-4">
          Enter the 4-digits code that were sent to your email address
        </p>
        
        <div class="d-flex justify-content-center gap-3 mb-4">
          <input class="otp-input" type="tel" maxlength="1">
          <input class="otp-input" type="tel" maxlength="1">
          <input class="otp-input" type="tel" maxlength="1">
          <input class="otp-input" type="tel" maxlength="1">
        </div>

        <button
          class="submit-btn w-100 mt-2"
          onclick="window.location.href='reset-password.html'">
          Continue
        </button>
      </div>
    </div>
  </div>
  
  <script src="../assets/js/auth.js"></script>
</body>
</html>
