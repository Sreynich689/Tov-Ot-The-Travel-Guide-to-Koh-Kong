<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700&amp;display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="min-vh-100 d-flex align-items-center justify-content-center px-3">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5">
      <div class="card p-4 p-md-5">

        <h1 class="heading text-center mb-3">Reset Password</h1>

        <p class="subtext text-center mb-4">
          Create a new password. Ensure that it's different from your previous one.
        </p>

        <!-- starts as type="text" so text is visible by default -->
        <div class="input-wrapper mb-3">
          <span class="input-icon">
            <i class="bi bi-key"></i>
          </span>
          <input class="field-input w-100" type="text" id="newPassword" placeholder="Enter new password">
          <button class="eye-btn" type="button" onclick="togglePassword('newPassword', 'eyeIcon1')">
            <i id="eyeIcon1" class="bi bi-eye"></i>
          </button>
        </div>

        <!-- starts as type="text" so text is visible by default -->
        <div class="input-wrapper mb-3">
          <span class="input-icon">
            <i class="bi bi-key"></i>
          </span>
          <input class="field-input w-100" type="text" id="confirmPassword" placeholder="Re-enter new password">
          <button class="eye-btn" type="button" onclick="togglePassword('confirmPassword', 'eyeIcon2')">
            <i id="eyeIcon2" class="bi bi-eye"></i>
          </button>
        </div>

        <ul class="rules ps-3 mb-3">
          <li>At least 8 characters</li>
          <li>One number</li>
          <li>One special character</li>
        </ul>

        <button class="submit-btn w-100 mt-2" type="button">
          Continue
        </button>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon  = document.getElementById(iconId);

      if (input.type === 'text') {
        /* text is visible → hide it, show eye-slash */
        input.type = 'password';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
      } else {
        /* text is hidden → show it, show eye */
        input.type = 'text';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
      }
    }
  </script>


</body>
</html>
